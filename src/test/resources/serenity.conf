serenity {
  take.screenshots = AFTER_EACH_STEP
  restart.browser.for.each = feature
  logging = VERBOSE
  step.delay = 0

  report {
    accessibility = true
    durations = "1,2,4,8,15,30,60"
    exclude.tags = "resetappstate,singlebrowser,manual"
  }

  requirement {
    types = "epic, feature"
  }
}

headless.mode = false

webdriver {
  driver = chrome
  # Aquí centralizamos los timeouts
  timeouts {
    implicitlywait = 5000
    fluentwait = 10000
  }

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "start-maximized",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "disable-extensions",
        "disable-web-security",
        "disable-translate",
        "disable-logging",
        "remote-allow-origins=*"
      ]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://shop.polymer-project.org/"
  }
  dev {
    webdriver.base.url = "https://dev.shop.polymer-project.org/"
  }
  qa {
    webdriver.base.url = "https://qa.shop.polymer-project.org/"
  }
  prod {
    webdriver.base.url = "https://shop.polymer-project.org/"
  }
}